name: Scraper diario

on:
  schedule:
    - cron: '0 10 * * *'   # 7 AM Argentina
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas requests openpyxl

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Subir resultados
        run: |
          git config --global user.name "bot-precios"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "actualizacion diaria precios" || echo "sin cambios"
          git push
